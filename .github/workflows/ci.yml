name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  ruby-quality:
    name: Ruby quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run Ruby unit tests and RuboCop
        run: bundle exec rake quality

  ruby-integration:
    name: Ruby Redis integration
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run Redis-backed integration tests
        env:
          INTEGRATION_REDIS_URL: redis://127.0.0.1:6379/0
          REQUIRE_REDIS_INTEGRATION: '1'
        run: bundle exec rake test:integration

  signature-tool:
    name: Signature tool
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Run signature-tool tests
        working-directory: services/signature-tool
        run: ./gradlew test
