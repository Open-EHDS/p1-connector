paths:
  inbox: <%= ENV['P1_INBOX_PATH'] || "#{ENV['P1_DATA_ROOT'] || './var/data'}/inbox" %>
  processing: <%= ENV['P1_PROCESSING_PATH'] || "#{ENV['P1_DATA_ROOT'] || './var/data'}/processing" %>
  done: <%= ENV['P1_DONE_PATH'] || "#{ENV['P1_DATA_ROOT'] || './var/data'}/done" %>
  invalid: <%= ENV['P1_INVALID_PATH'] || "#{ENV['P1_DATA_ROOT'] || './var/data'}/invalid" %>
  results: <%= ENV['P1_RESULTS_PATH'] || "#{ENV['P1_DATA_ROOT'] || './var/data'}/results" %>
  audit_log: <%= ENV['P1_AUDIT_LOG_PATH'] || "#{ENV['P1_LOGS_ROOT'] || './var/logs'}/audit.jsonl" %>

redis:
  url: <%= ENV['REDIS_URL'] || 'redis://127.0.0.1:6379/0' %>

signature_service:
  url: <%= ENV['SIGNATURE_SERVICE_URL'] || 'http://127.0.0.1:9093' %>

p1:
  environment: <%= ENV['P1_ENVIRONMENT'] || 'integration' %>
  request_timeout_seconds: <%= ENV['P1_REQUEST_TIMEOUT_SECONDS'] || 180 %>

subject:
  oid: "2.16.840.1.113883.3.4424.2.7.659"
  identification_code: "000000926988"
  department_code_v: "00"
  department_code_vii: "001"
  is_practice: false
  medical_chamber: "NIL"
  name: "IQ DENTAL TEST"
  regon: "81431692500000"
  address: "99-205, Lodz, ul. Lodowa 1 / 14"
  phone: "987654321"

certificates:
  base_path: <%= ENV['P1_CERTIFICATES_BASE_PATH'] || './volumes/certs' %>
  wss:
    filename: Podmiot_leczniczy_358-wss.p12
    password_env: WSS_CERT_PASSWORD
  tls:
    filename: Podmiot_leczniczy_358-tls.p12
    password_env: TLS_CERT_PASSWORD
