services:
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${HOST_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  signature-tool:
    build:
      context: ../signature_tool
    ports:
      - "${HOST_SIGNATURE_API_PORT:-9093}:8080"
    environment:
      SIGNATURE_TOOL_SIGNING_CERTIFICATE_PATH: "${SIGNATURE_TOOL_SIGNING_CERTIFICATE_PATH:-/certs/wss.p12}"
      SIGNATURE_TOOL_SIGNING_PASSWORD: "${SIGNATURE_TOOL_SIGNING_PASSWORD:-}"
    volumes:
      - ./volumes/certs:/certs:ro

volumes:
  redis-data:
